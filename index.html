<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎤 World's Most Useless Live Generator</title>
<style>
  :root{
    --ink:#0A0812;
    --magenta:#FF3EA5;
    --cyan:#2EE6FF;
    --gold:#FFD34D;
    --violet:#9D4EDD;
    --paper:#F5F2FF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  canvas#fx{position:fixed;inset:0;width:100vw;height:100vh;display:block;}

  /* ---------- overlays ---------- */
  #strobe{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5;}
  #flash{position:fixed;inset:0;background:radial-gradient(circle at 50% 60%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%);
    opacity:0;pointer-events:none;z-index:5;transition:opacity .4s;}

  /* ---------- UI ---------- */
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10;}

  #title{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
    text-align:center;transition:opacity 1s, filter 1s;}
  #title h1{font-family:Impact,"Arial Black",sans-serif;
    font-size:clamp(28px,6vw,72px);line-height:1.05;letter-spacing:.04em;color:var(--paper);
    text-shadow:0 0 18px rgba(46,230,255,.8),0 0 60px rgba(255,62,165,.5);}
  #title h1 span{color:var(--gold);text-shadow:0 0 18px rgba(255,211,77,.9),0 0 60px rgba(255,211,77,.4);}
  #title p{margin-top:18px;font-size:clamp(14px,2.4vw,22px);color:var(--cyan);
    letter-spacing:.3em;animation:blink 1.4s infinite;}
  #title small{display:block;margin-top:10px;color:rgba(245,242,255,.55);letter-spacing:.1em;font-size:12px;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .hidden-title{opacity:0;filter:blur(8px);}

  /* combo */
  #combo{position:absolute;top:8vh;left:50%;transform:translateX(-50%) scale(1);
    font-family:Impact,"Arial Black",sans-serif;font-size:clamp(26px,5vw,58px);
    color:var(--gold);text-shadow:0 0 14px rgba(255,211,77,.9),0 4px 0 rgba(0,0,0,.5);
    opacity:0;white-space:nowrap;}
  #comboLabel{position:absolute;top:calc(8vh + 70px);left:50%;transform:translateX(-50%);
    font-family:Impact,"Arial Black",sans-serif;font-size:clamp(22px,4.2vw,46px);
    color:var(--magenta);text-shadow:0 0 16px rgba(255,62,165,1),0 0 60px rgba(255,62,165,.6);
    opacity:0;white-space:nowrap;letter-spacing:.06em;}
  .pop{animation:pop .35s ease-out;}
  @keyframes pop{0%{transform:translateX(-50%) scale(1.6)}100%{transform:translateX(-50%) scale(1)}}

  /* live power gauge */
  #power{position:absolute;top:18px;right:18px;width:min(240px,46vw);text-align:right;}
  #power .lbl{font-size:12px;letter-spacing:.25em;color:var(--cyan);margin-bottom:6px;
    text-shadow:0 0 8px rgba(46,230,255,.8);}
  #powerBar{height:14px;border:1px solid rgba(46,230,255,.6);border-radius:7px;overflow:hidden;
    background:rgba(255,255,255,.06);box-shadow:0 0 12px rgba(46,230,255,.35) inset;}
  #powerFill{height:100%;width:0%;border-radius:7px;
    background:linear-gradient(90deg,var(--cyan),var(--violet),var(--magenta),var(--gold));
    box-shadow:0 0 14px rgba(255,62,165,.8);transition:width .15s;}
  #powerPct{font-size:12px;color:var(--paper);margin-top:4px;letter-spacing:.15em;}

  /* big event banner */
  #banner{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) rotate(-3deg);
    font-family:Impact,"Arial Black",sans-serif;font-size:clamp(34px,8vw,110px);
    color:#fff;-webkit-text-stroke:2px var(--magenta);
    text-shadow:0 0 30px rgba(255,62,165,1),0 0 90px rgba(46,230,255,.8);
    opacity:0;white-space:nowrap;z-index:11;}
  .bannerIn{animation:bannerIn 2.4s ease-out forwards;}
  @keyframes bannerIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-3deg) scale(3);}
    12%{opacity:1;transform:translate(-50%,-50%) rotate(-3deg) scale(1);}
    80%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(-3deg) scale(1.1);}
  }

  /* everything mode vignette */
  #everything{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity 1s;
    background:
      radial-gradient(ellipse at 20% 110%, rgba(255,62,165,.25), transparent 55%),
      radial-gradient(ellipse at 80% 110%, rgba(46,230,255,.25), transparent 55%),
      radial-gradient(ellipse at 50% -20%, rgba(157,78,221,.35), transparent 60%);}
  .rainbowPulse{animation:rainbow 3s linear infinite;}
  @keyframes rainbow{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(360deg)}}

  #hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    font-size:11px;color:rgba(245,242,255,.4);letter-spacing:.12em;white-space:nowrap;}
  #mobileInput{position:fixed;opacity:0.01;bottom:0;left:0;width:1px;height:1px;z-index:1;}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div id="strobe"></div>
<div id="flash"></div>
<div id="everything"></div>

<div id="ui">
  <div id="title">
    <h1>WORLD'S MOST <span>USELESS</span><br>LIVE GENERATOR</h1>
    <p>TYPE ANYTHING...</p>
    <small>世界一無駄に豪華なタイピング体験 / スマホは画面タップ</small>
  </div>
  <div id="combo"></div>
  <div id="comboLabel"></div>
  <div id="power">
    <div class="lbl">LIVE POWER</div>
    <div id="powerBar"><div id="powerFill"></div></div>
    <div id="powerPct">0%</div>
  </div>
  <div id="banner"></div>
  <div id="hint">A:紙吹雪 S:花火 D:レーザー F:火柱 G:照明 H:スモーク J:ストロボ K:歓声 L:ミラーボール Space:ジャンプ Enter:フィナーレ</div>
</div>
<input id="mobileInput" autocomplete="off" autocapitalize="characters" aria-hidden="true">

<script>
"use strict";
/* =====================================================
   🎤 World's Most Useless Live Generator
   意味は無い。演出は全力。
===================================================== */
const cvs = document.getElementById('fx');
const ctx = cvs.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = W*DPR; cvs.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildCrowd();
}
window.addEventListener('resize', resize);

/* ---------------- state ---------------- */
const P = [];          // particles
const beams = [];      // lasers
const spots = [];      // spotlights
let shake = 0;
let strobeUntil = 0;
let lightningUntil = 0, lightningPath = null;
let power = 0;
let combo = 0, comboTimer = null;
let everythingUntil = 0;
let moonY = -200;
let ballLife = 0, ballY = -100;
let typedBuf = "";
let started = false;
let lastKeyTime = 0;
let keyCount = 0;

const crowd = [];
function buildCrowd(){
  crowd.length = 0;
  const n = Math.max(24, Math.floor(W/26));
  for(let i=0;i<n;i++){
    crowd.push({x:(i+0.5)*(W/n)+(Math.random()*8-4), r:9+Math.random()*7,
      phase:Math.random()*Math.PI*2, jy:0, jv:0, arm:0});
  }
}
resize();

/* ---------------- audio ---------------- */
let AC=null, master=null;
function audio(){
  if(AC) return AC;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.32;
  const comp = AC.createDynamicsCompressor();
  master.connect(comp); comp.connect(AC.destination);
  return AC;
}
function env(g,t0,a,peak,d){
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(peak,t0+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+a+d);
}
function noiseBuf(){
  const b = AC.createBuffer(1, AC.sampleRate*0.5, AC.sampleRate);
  const d = b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  return b;
}
let _nb=null;
function playNoise(dur, type, freq, q, peak){
  const t=AC.currentTime;
  _nb = _nb||noiseBuf();
  const src=AC.createBufferSource(); src.buffer=_nb; src.loop=true;
  const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=freq; f.Q.value=q||1;
  const g=AC.createGain(); env(g,t,0.005,peak,dur);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t); src.stop(t+dur+0.1);
}
function kick(){ if(!AC)return; const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(42,t+0.14);
  env(g,t,0.003,0.9,0.22); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.3);}
function hat(){ if(!AC)return; playNoise(0.05,'highpass',7000,1,0.25);}
function clap(){ if(!AC)return; playNoise(0.12,'bandpass',1800,2,0.5); setTimeout(()=>playNoise(0.1,'bandpass',2200,2,0.3),30);}
function boom(){ if(!AC)return; playNoise(0.6,'lowpass',300,1,0.8); const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(30,t+0.5);
  env(g,t,0.01,0.6,0.5); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.6);}
const PENTA=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0];
function synth(i,wave){ if(!AC)return; const t=AC.currentTime;
  const f=PENTA[i%PENTA.length]*(1+Math.floor(i/PENTA.length)*0);
  const o=AC.createOscillator(); o.type=wave||'sawtooth'; o.frequency.value=f;
  const fl=AC.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=2400;
  const g=AC.createGain(); env(g,t,0.005,0.35,0.28);
  o.connect(fl); fl.connect(g); g.connect(master); o.start(t); o.stop(t+0.35);}
function bassNote(){ if(!AC)return; const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='square'; o.frequency.value=65.4;
  const g=AC.createGain(); env(g,t,0.004,0.4,0.3);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.35);}
function cheerSound(big){ if(!AC)return;
  playNoise(big?1.6:0.9,'bandpass',big?1000:1400,0.7,big?0.7:0.45);
  setTimeout(()=>playNoise(0.5,'bandpass',2400,1,0.3),120);}

/* ---------------- particle helpers ---------------- */
const COLORS=['#FF3EA5','#2EE6FF','#FFD34D','#9D4EDD','#61FF7E','#FF7847'];
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];

function confetti(x,y,n,color){
  for(let i=0;i<n;i++) P.push({t:'conf',x,y,vx:rand(-5,5),vy:rand(-11,-3),
    g:0.22,life:1,dk:rand(0.006,0.012),c:color||pick(COLORS),
    w:rand(5,10),h:rand(8,16),rot:rand(0,6.28),vr:rand(-0.25,0.25)});
}
function sparkBurst(x,y,n,c,sp){
  for(let i=0;i<n;i++){const a=rand(0,6.28),v=rand(1,sp||7);
    P.push({t:'spark',x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,g:0.06,
      life:1,dk:rand(0.012,0.03),c:c||pick(COLORS),s:rand(1.5,3.5)});}
}
function firework(x){
  P.push({t:'rocket',x:x??rand(W*0.15,W*0.85),y:H,vx:rand(-1,1),vy:rand(-14,-11),
    life:1,dk:0,c:pick(COLORS),fuse:rand(H*0.2,H*0.45)});
}
function firePillar(x){
  const bx = x??rand(W*0.1,W*0.9);
  for(let i=0;i<26;i++) P.push({t:'fire',x:bx+rand(-14,14),y:H-10,
    vx:rand(-0.6,0.6),vy:rand(-9,-5),g:-0.05,life:1,dk:rand(0.018,0.035),s:rand(10,26)});
}
function smoke(x){
  const bx=x??rand(W*0.1,W*0.9);
  for(let i=0;i<10;i++) P.push({t:'smoke',x:bx+rand(-30,30),y:H+20,
    vx:rand(-0.5,0.5),vy:rand(-1.6,-0.7),g:0,life:1,dk:rand(0.004,0.008),s:rand(30,70)});
}
function meteor(){
  P.push({t:'meteor',x:rand(-100,W*0.4),y:rand(-80,H*0.25),
    vx:rand(7,12),vy:rand(4,7),life:1,dk:0.012,c:'#BFF7FF',s:rand(2,4)});
}
function laser(){
  beams.push({x:pick([0,W]),y:0,ang:rand(0.4,1.2),sweep:rand(-0.02,0.02),
    hue:rand(0,360),life:1,dk:0.02});
}
function spotlight(){
  spots.push({x:rand(W*0.15,W*0.85),phase:rand(0,6.28),c:pick(COLORS),life:1,dk:0.008});
}
function strobe(ms){ strobeUntil = performance.now()+(ms||500); }
function lightning(){
  lightningUntil = performance.now()+180;
  const p=[[rand(W*0.2,W*0.8),0]]; let y=0;
  while(y<H*0.7){ y+=rand(30,70); p.push([p[p.length-1][0]+rand(-60,60),y]); }
  lightningPath=p;
  boom(); addShake(10);
  document.getElementById('flash').style.opacity=0.8;
  setTimeout(()=>document.getElementById('flash').style.opacity=0,60);
}
function mirrorBall(){ ballLife=1; ballY=-80; if(AC)synth(8,'triangle'); }
function bigText(ch){
  P.push({t:'char',ch,x:rand(W*0.2,W*0.8),y:rand(H*0.35,H*0.7),
    vx:rand(-0.5,0.5),vy:rand(-2.4,-1.2),life:1,dk:0.012,
    c:pick(COLORS),s:rand(60,120),rot:rand(-0.3,0.3)});
}
function emojiFly(e,size){
  const fromLeft = Math.random()<0.5;
  P.push({t:'emoji',ch:e,x:fromLeft?-120:W+120,y:rand(H*0.15,H*0.55),
    vx:(fromLeft?1:-1)*rand(2.5,4.5),vy:Math.sin(rand(0,6))*0.3,
    life:1,dk:0.0018,s:size||110,wob:rand(0,6.28)});
}
function emojiRain(e,n){
  for(let i=0;i<n;i++) P.push({t:'emoji',ch:e,x:rand(0,W),y:rand(-H*0.6,-30),
    vx:rand(-0.5,0.5),vy:rand(2,4.5),life:1,dk:0.001,s:rand(30,60),wob:rand(0,6.28)});
}
function cheer(big){
  cheerSound(big);
  for(const c of crowd){ c.jv=Math.min(c.jv,-rand(3,6)); c.arm=1; }
  for(let i=0;i<(big?14:7);i++)
    P.push({t:'emoji',ch:pick(['👏','🙌','✨','🎉']),x:rand(0,W),y:H-rand(20,60),
      vx:rand(-1,1),vy:rand(-4,-2),life:1,dk:0.01,s:rand(24,40),wob:rand(0,6.28)});
}
function crowdJump(){
  kick(); addShake(6);
  for(const c of crowd) c.jv=-rand(7,11);
}
function addShake(v){ shake=Math.min(24,shake+v); }
function addPower(v){
  power=Math.min(100,power+v);
  if(power>=100 && performance.now()>everythingUntil) startEverything();
  updatePowerUI();
}
function updatePowerUI(){
  document.getElementById('powerFill').style.width=power+'%';
  document.getElementById('powerPct').textContent=Math.floor(power)+'%';
}

/* ---------------- banner / combo ---------------- */
function showBanner(text){
  const b=document.getElementById('banner');
  b.textContent=text;
  b.classList.remove('bannerIn'); void b.offsetWidth;
  b.classList.add('bannerIn');
}
const COMBO_LABELS=[
  [300,'そろそろ寝ろ'],
  [200,'WHAT ARE YOU DOING'],
  [100,'LEGENDARY PERFORMANCE'],
  [50,'ULTIMATE SHOW'],
  [25,'MEGA LIVE'],
  [10,'NICE!!'],
];
function bumpCombo(){
  combo++;
  clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0; fadeCombo();},2000);
  const c=document.getElementById('combo');
  if(combo>=3){
    c.textContent='COMBO ×'+combo;
    c.style.opacity=1;
    c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');
  }
  const lbl=document.getElementById('comboLabel');
  for(const [n,t] of COMBO_LABELS){
    if(combo===n){
      lbl.textContent=t; lbl.style.opacity=1;
      lbl.classList.remove('pop'); void lbl.offsetWidth; lbl.classList.add('pop');
      strobe(200); confetti(W/2,H*0.3,60); addShake(8); cheer(n>=50);
      if(n>=100){ for(let i=0;i<4;i++) firework(); }
      break;
    }
  }
}
function fadeCombo(){
  document.getElementById('combo').style.opacity=0;
  document.getElementById('comboLabel').style.opacity=0;
}

/* ---------------- everything mode ---------------- */
let everyTimer=null;
function startEverything(){
  everythingUntil = performance.now()+12000;
  showBanner('EVERYTHING MODE');
  document.getElementById('everything').style.opacity=1;
  document.body.classList.add('rainbowPulse');
  cheer(true); strobe(700); addShake(14);
  moonY = -200;
  clearInterval(everyTimer);
  everyTimer=setInterval(()=>{
    if(performance.now()>everythingUntil){ stopEverything(); return; }
    const fns=[()=>firework(),()=>laser(),()=>confetti(rand(0,W),rand(0,H*0.4),18),
      ()=>firePillar(),()=>meteor(),()=>spotlight(),()=>{if(Math.random()<0.25)lightning();},
      ()=>{if(Math.random()<0.3)strobe(120);}];
    pick(fns)(); pick(fns)();
  },160);
}
function stopEverything(){
  clearInterval(everyTimer);
  document.getElementById('everything').style.opacity=0;
  document.body.classList.remove('rainbowPulse');
  power=0; updatePowerUI();
  showBanner('THANK YOU!!');
  cheer(true);
}

/* ---------------- random guests ---------------- */
const GUESTS=[['🦆',160],['🛸',130],['🐉',170],['🦖',160],['🍣',150],['👽',130],['🦙',150],['🐈',140]];
function maybeGuest(){
  if(Math.random()<0.02){
    const g=pick(GUESTS);
    showBanner('SPECIAL GUEST!!');
    emojiFly(g[0],g[1]);
    cheer(true); strobe(300);
  }
}

/* ---------------- hidden commands ---------------- */
const SECRETS={
  'NEKO':()=>{showBanner('猫ライブ開演🐱'); emojiRain('🐱',40); cheer(true);},
  'RAVE':()=>{showBanner('RAVE MODE'); for(let i=0;i<10;i++)laser(); strobe(1200); kick();},
  'FIREWORK':()=>{showBanner('HANABI!!'); for(let i=0;i<10;i++)setTimeout(firework,i*150);},
  'HELLO':()=>{showBanner('HELLOOOO!!'); cheer(true); confetti(W/2,H*0.4,80);},
  'SUSHI':()=>{showBanner('へい、おまち！'); emojiRain('🍣',30); emojiFly('🍣',180);},
  'AIKIDO':()=>{showBanner('気を出せ'); for(let i=0;i<6;i++)spotlight(); smoke(); smoke();},
};
function checkSecret(ch){
  typedBuf=(typedBuf+ch).slice(-12);
  for(const k in SECRETS){
    if(typedBuf.endsWith(k)){ SECRETS[k](); typedBuf=''; addPower(15); break; }
  }
}

/* ---------------- finale ---------------- */
function finale(){
  showBanner('FINALE!!!');
  boom(); cheer(true); strobe(900); addShake(20);
  for(let i=0;i<8;i++) setTimeout(firework,i*120);
  for(let i=0;i<6;i++) laser();
  firePillar(W*0.2); firePillar(W*0.5); firePillar(W*0.8);
  confetti(W*0.3,H*0.3,80,'#FFD34D'); confetti(W*0.7,H*0.3,80);
  mirrorBall();
}

/* ---------------- key handling ---------------- */
const KEYMAP={
  'A':()=>{confetti(rand(W*0.2,W*0.8),rand(H*0.2,H*0.5),50,'#FFD34D'); clap();},
  'S':()=>{firework(); firework();},
  'D':()=>{laser(); laser(); synth(6);},
  'F':()=>{firePillar(); bassNote(); addShake(4);},
  'G':()=>{spotlight(); synth(3,'triangle');},
  'H':()=>{smoke(); hat();},
  'J':()=>{strobe(260); hat();},
  'K':()=>{cheer(false);},
  'L':()=>{mirrorBall();},
};
function handleKey(key){
  if(!started){
    started=true;
    document.getElementById('title').classList.add('hidden-title');
  }
  audio(); if(AC.state==='suspended')AC.resume();
  keyCount++;
  const up=key.toUpperCase();

  if(key===' '){ crowdJump(); addPower(3); bumpCombo(); return; }
  if(key==='Enter'){ finale(); addPower(8); bumpCombo(); return; }
  if(key.length!==1) return;

  bumpCombo(); addPower(2.2); maybeGuest();

  if(KEYMAP[up]){ KEYMAP[up](); }
  else if(/[A-Z]/.test(up)){
    // その他のキー: 文字ごとに決まったミニ演出+音階
    const code=up.charCodeAt(0)-65;
    synth(code%PENTA.length, code%2?'sawtooth':'square');
    const fx=code%5;
    if(fx===0) sparkBurst(rand(W*0.2,W*0.8),rand(H*0.2,H*0.6),24,COLORS[code%COLORS.length]);
    else if(fx===1) confetti(rand(W*0.2,W*0.8),rand(H*0.2,H*0.5),20,COLORS[code%COLORS.length]);
    else if(fx===2) meteor();
    else if(fx===3) laser();
    else firework();
    if(keyCount%4===0) kick();
  }
  else if(/[0-9]/.test(up)){
    const n=+up; synth(n%PENTA.length,'triangle');
    sparkBurst(rand(W*0.2,W*0.8),rand(H*0.2,H*0.6),18,COLORS[n%COLORS.length]);
    if(n===0) meteor();
  }
  else { hat(); sparkBurst(rand(W*0.2,W*0.8),rand(H*0.3,H*0.6),12); }

  if(/[A-Z0-9]/.test(up)) { bigText(up); checkSecret(up); }
}

window.addEventListener('keydown',e=>{
  if(e.key==='Tab' || e.metaKey || e.ctrlKey || e.key.startsWith('F') && e.key.length>1) return;
  if(e.repeat && Math.random()<0.5) return; // 長押し連打は間引き
  e.preventDefault();
  handleKey(e.key);
},{passive:false});

/* mobile: タップでキーボード召喚 */
const mi=document.getElementById('mobileInput');
document.body.addEventListener('pointerdown',()=>{ mi.focus(); });
mi.addEventListener('input',()=>{
  const v=mi.value;
  if(v){ handleKey(v[v.length-1]); mi.value=''; }
});
mi.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); handleKey('Enter'); }
  if(e.key===' '){ e.preventDefault(); handleKey(' '); }
});

/* ---------------- render loop ---------------- */
function drawCrowd(t){
  // ステージ床グラデ
  const g=ctx.createLinearGradient(0,H-120,0,H);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.fillStyle=g; ctx.fillRect(0,H-120,W,120);

  ctx.fillStyle='#050409';
  for(const c of crowd){
    c.jv+=0.6; c.jy+=c.jv;
    if(c.jy>0){c.jy=0;c.jv=0;}
    c.arm*=0.96;
    const bob=Math.sin(t/400+c.phase)*3;
    const y=H-24+bob+c.jy;
    // 頭
    ctx.beginPath(); ctx.arc(c.x,y-c.r*1.4,c.r*0.8,0,6.28); ctx.fill();
    // 体
    ctx.beginPath(); ctx.ellipse(c.x,y+c.r*0.6,c.r,c.r*1.4,0,0,6.28); ctx.fill();
    // 腕(歓声時)
    if(c.arm>0.1||c.jy<-4){
      ctx.strokeStyle='#050409'; ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(c.x-c.r*0.7,y-c.r*0.4); ctx.lineTo(c.x-c.r*1.3,y-c.r*1.8);
      ctx.moveTo(c.x+c.r*0.7,y-c.r*0.4); ctx.lineTo(c.x+c.r*1.3,y-c.r*1.8);
      ctx.stroke();
    }
  }
}

function frame(t){
  requestAnimationFrame(frame);
  // shake
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  shake*=0.9;
  ctx.setTransform(DPR,0,0,DPR,sx*DPR,sy*DPR);
  // 背景
  ctx.fillStyle='#0A0812';
  ctx.fillRect(-30,-30,W+60,H+60);

  const every = t<everythingUntil;

  // オーロラ(Everything Mode)
  if(every){
    for(let i=0;i<3;i++){
      const y0=60+i*50+Math.sin(t/900+i)*30;
      const gr=ctx.createLinearGradient(0,y0,0,y0+120);
      gr.addColorStop(0,'rgba(0,0,0,0)');
      gr.addColorStop(0.5,`hsla(${(t/20+i*90)%360},90%,60%,0.14)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,y0,W,120);
    }
    // 巨大月
    moonY=Math.min(H*0.22,moonY+1.2);
    ctx.save(); ctx.globalAlpha=0.9;
    const mg=ctx.createRadialGradient(W*0.82,moonY,10,W*0.82,moonY,90);
    mg.addColorStop(0,'#FFF6D8'); mg.addColorStop(1,'rgba(255,246,216,0)');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(W*0.82,moonY,90,0,6.28); ctx.fill();
    ctx.fillStyle='#F7EFC9'; ctx.beginPath(); ctx.arc(W*0.82,moonY,46,0,6.28); ctx.fill();
    ctx.restore();
  }

  // スポットライト
  ctx.globalCompositeOperation='lighter';
  for(let i=spots.length-1;i>=0;i--){
    const s=spots[i]; s.life-=s.dk;
    if(s.life<=0){spots.splice(i,1);continue;}
    const swing=Math.sin(t/700+s.phase)*W*0.18;
    const gx=s.x+swing;
    const gr=ctx.createLinearGradient(s.x,0,gx,H);
    gr.addColorStop(0,s.c+'00');
    gr.addColorStop(0.15,s.c+'55');
    gr.addColorStop(1,s.c+'00');
    ctx.fillStyle=gr;
    ctx.globalAlpha=s.life*0.8;
    ctx.beginPath();
    ctx.moveTo(s.x,0); ctx.lineTo(gx-70,H); ctx.lineTo(gx+70,H); ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha=1;

  // レーザー
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i]; b.life-=b.dk; b.ang+=b.sweep;
    if(b.life<=0){beams.splice(i,1);continue;}
    const dir=b.x===0?1:-1;
    const len=Math.hypot(W,H)*1.2;
    const ex=b.x+Math.cos(b.ang)*len*dir, ey=b.y+Math.sin(b.ang)*len;
    ctx.strokeStyle=`hsla(${b.hue},100%,60%,${b.life})`;
    ctx.lineWidth=3; ctx.shadowBlur=18; ctx.shadowColor=`hsl(${b.hue},100%,60%)`;
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.shadowBlur=0;
  }

  // ミラーボール
  if(ballLife>0){
    ballLife-=0.003; ballY=Math.min(H*0.18,ballY+2);
    const r=42;
    ctx.strokeStyle='rgba(220,230,255,0.6)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,ballY-r); ctx.stroke();
    const bg=ctx.createRadialGradient(W/2-12,ballY-12,4,W/2,ballY,r);
    bg.addColorStop(0,'#FFFFFF'); bg.addColorStop(1,'#8FA6C9');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(W/2,ballY,r,0,6.28); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)';
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.ellipse(W/2,ballY,r,Math.abs(i)*r/3+2,0,0,6.28);ctx.stroke();}
    if(Math.random()<0.5){
      const a=rand(0,6.28), d=rand(r,r*6);
      P.push({t:'spark',x:W/2+Math.cos(a)*d,y:ballY+Math.sin(a)*d,
        vx:0,vy:0,g:0,life:1,dk:0.05,c:'#FFFFFF',s:rand(1,3)});
    }
    if(ballLife<=0) ballLife=0;
  }

  // パーティクル
  for(let i=P.length-1;i>=0;i--){
    const p=P[i]; p.life-=p.dk;
    if(p.life<=0 || p.y>H+150 || p.x<-200 || p.x>W+200){P.splice(i,1);continue;}
    p.vy+=(p.g||0); p.x+=p.vx; p.y+=p.vy;
    switch(p.t){
      case 'conf':
        p.rot+=p.vr; p.vx*=0.99;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.globalAlpha=Math.min(1,p.life*1.5); ctx.fillStyle=p.c;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h*(0.4+Math.abs(Math.sin(p.rot*2))*0.6));
        ctx.restore(); break;
      case 'spark':
        ctx.globalAlpha=p.life; ctx.fillStyle=p.c;
        ctx.shadowBlur=8; ctx.shadowColor=p.c;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.s*p.life,0,6.28); ctx.fill();
        ctx.shadowBlur=0; break;
      case 'rocket':
        ctx.globalAlpha=1; ctx.fillStyle='#FFF';
        ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,6.28); ctx.fill();
        if(Math.random()<0.6)P.push({t:'spark',x:p.x,y:p.y,vx:0,vy:1,g:0,life:0.6,dk:0.06,c:'#FFD34D',s:1.6});
        if(p.y<=p.fuse){ P.splice(i,1); boom(); addShake(5);
          sparkBurst(p.x,p.y,70,p.c,8); sparkBurst(p.x,p.y,30,'#FFFFFF',4); }
        break;
      case 'fire':{
        const hue=20+p.life*35;
        ctx.globalAlpha=p.life*0.9;
        ctx.fillStyle=`hsl(${hue},100%,${45+p.life*20}%)`;
        ctx.shadowBlur=20; ctx.shadowColor='#FF7847';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.s*p.life,0,6.28); ctx.fill();
        ctx.shadowBlur=0; break;}
      case 'smoke':
        ctx.globalAlpha=p.life*0.16; ctx.fillStyle='#C9C4D8';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.s*(2-p.life),0,6.28); ctx.fill();
        break;
      case 'meteor':
        ctx.globalAlpha=p.life; ctx.strokeStyle=p.c; ctx.lineWidth=p.s;
        ctx.shadowBlur=12; ctx.shadowColor=p.c;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*6,p.y-p.vy*6); ctx.stroke();
        ctx.shadowBlur=0; break;
      case 'char':
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.globalAlpha=p.life;
        ctx.font=`bold ${p.s}px Impact,'Arial Black',sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=24; ctx.shadowColor=p.c;
        ctx.fillStyle=p.c; ctx.fillText(p.ch,0,0);
        ctx.restore(); break;
      case 'emoji':
        p.wob+=0.06;
        ctx.globalAlpha=Math.min(1,p.life*2);
        ctx.font=`${p.s}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(p.ch,p.x,p.y+Math.sin(p.wob)*8);
        break;
    }
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // 雷
  if(t<lightningUntil && lightningPath){
    ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=3;
    ctx.shadowBlur=24; ctx.shadowColor='#BFF7FF';
    ctx.beginPath(); ctx.moveTo(lightningPath[0][0],lightningPath[0][1]);
    for(const [x,y] of lightningPath) ctx.lineTo(x,y);
    ctx.stroke(); ctx.shadowBlur=0;
  }

  // 観客
  drawCrowd(t);

  // ストロボ
  document.getElementById('strobe').style.opacity =
    (t<strobeUntil && Math.floor(t/45)%2===0) ? 0.85 : 0;

  // パワー自然減衰
  if(power>0 && t>everythingUntil){ power=Math.max(0,power-0.015); if(keyCount%1===0)updatePowerUI(); }

  // パーティクル上限
  if(P.length>900) P.splice(0,P.length-900);
}
requestAnimationFrame(frame);
</script>
